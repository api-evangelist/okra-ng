description: >-
  FinOps view of Okra spend. Okra billed usage-based per-call / per-record
  rates for data products (Auth, Balance, Transactions, Identity, Income) and
  per-transaction fees for bank-to-bank Payments, with enterprise volume
  agreements negotiated directly. Exact published rates were quote-based and
  are not reconciled. NOTE: Okra wound down operations in May 2025; this view
  is historical.
notes: >-
  Per-call and per-transaction rates were not publicly enumerated; verify
  against an invoice or agreement. Monetary values are not reconciled.
