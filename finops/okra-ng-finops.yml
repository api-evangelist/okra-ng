principles:
- name: Visibility
  description: Pull Okra dashboard usage; inspect per-product call volume and payment counts.
- name: Allocation
  description: Tag API keys per workload/team; map data-product and payment usage to internal cost centers.
- name: Optimization
  description: Cache product data within webhook freshness windows; batch record retrieval via pagination; avoid redundant re-pulls of the same Record.
- name: Accountability
  description: Assign owners per integration/key; review monthly call and payment spend against budget.
