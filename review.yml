actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket or SSE streaming surface exists, so no AsyncAPI document was
    authored. The REST surface (POST product and query endpoints) plus outbound
    webhook callbacks are captured in apis.yml, the OpenAPI specification, and
    the Postman / Open Collection artifacts. Company-status findings note the
    May 2025 wind-down so the catalog does not misrepresent Okra as an active
    provider.
