aid: okra-ng
name: Okra
review:
  question: Does Okra expose a documented public WebSocket or streaming API, and is the API still operating?
  answer: false
  date: '2026-06-21'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was created. Okra's API was entirely request/response
    REST over HTTPS (all product and query endpoints are POST), with
    asynchronous delivery handled by HTTP webhook callbacks to a customer-hosted
    callback_url - not WebSocket, SSE, or any provider-hosted streaming
    transport. Webhooks are an outbound HTTP event mechanism and are modeled in
    the OpenAPI/Postman artifacts, not as an event-driven streaming API.
findings:
  summary: |
    Okra did not publish a documented public WebSocket or streaming API. The
    Okra platform exposed only REST (HTTPS) endpoints under
    https://api.okra.ng/v2, all invoked as POST requests authenticated with a
    Bearer secret key. Asynchronous results were delivered via outbound HTTP
    webhook callbacks to a configured callback_url, and callbacks could be
    re-triggered via POST /callback/trigger. The browser-side Okra Link widget
    (cdn.okra.ng/v2/bundle.js) handled account linking but is a client SDK, not
    an API transport. IMPORTANT: Okra wound down operations in May 2025 - both
    the core open-banking API business and its Nebula product were discontinued,
    and a UK firm (Kernel) acquired remaining assets. The API and developer
    docs may no longer be live; this catalog documents the interface as it was
    publicly published.
  companyStatus:
    operating: false
    windDownDate: '2025-05'
    note: |
      Okra Technologies (Lagos, Nigeria; founded 2019) quietly shut down its
      open-banking API and Nebula cloud product in May 2025 despite remaining
      runway, citing strategic and market challenges, and returned a portion of
      capital to investors. Assets were acquired by UK firm Kernel. No official
      public shutdown statement was issued. Documentation and API endpoints
      referenced here may be unreachable.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.okra.ng/v2
      documented: true
    - protocol: Webhook
      scheme: https
      note: Outbound HTTP POST callbacks to a customer-configured callback_url; re-triggerable via POST /callback/trigger. Not WebSocket or SSE.
      documented: true
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint was documented in Okra's API reference or product pages.
    - protocol: SSE
      scheme: https
      documented: false
      note: No Server-Sent Events streaming surface was documented.
